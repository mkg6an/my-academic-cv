bio: |
  Hi! I am a fourth-year PhD Candidate in Biostatistics at the University of Pennsylvania building statistical methods 
  motivated by real-world problems in public health and clinical care. My [dissertation work](#research), advised by [Dr. Nicholas J. Seewald](https://www.nickseewald.com/), focuses on causal inference
  methods for longitudinal data in various complex, non-experimental settings. 

